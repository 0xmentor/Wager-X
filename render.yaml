services:
  - type: web
    name: wagerx-backend
    runtime: node
    rootDir: backend
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 900
      - key: JWT_REFRESH_TTL
        value: 604800
      - key: PG_CONNECT_RETRIES
        value: 20
      - key: PG_CONNECT_RETRY_DELAY_MS
        value: 3000
      - key: AUTH_COOKIE_SAME_SITE
        value: none
      - key: ACCESS_COOKIE_NAME
        value: wagerx_access
      - key: REFRESH_COOKIE_NAME
        value: wagerx_refresh
      - key: USE_REDIS
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: wagerx-db
          property: connectionString

  - type: web
    name: wagerx-frontend
    runtime: node
    rootDir: frontend
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_SOLANA_RPC_ENDPOINT
        sync: false

databases:
  - name: wagerx-db
    plan: starter
    databaseName: solbet
    user: solbet_user
